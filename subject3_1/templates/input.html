<!DOCTYPE html>
<html lang="en">
<body>
    <form action="/result" method="POST">
        <p>Name <input type='text' name='Name'></p>
        <p><b>* Student Number</b> <input type='text' id='StudentNumber' name='StudentNumber' /></p>

        <p>Gender</p>
        <p>
            <input type='radio' name='gender' value='Male'> Male
            <input type='radio' name='gender' value='Female'> Female
        </p>

        <p>Major <input type='text' name='major'></p>

        <p>Programming Languages<br>
            <input type='checkbox' name='languages' value='Python'> Python
            <input type='checkbox' name='languages' value='Java'> Java
            <input type='checkbox' name='languages' value='HTML'> HTML
            <input type='checkbox' name='languages' value='C++'> C++
        </p>

        <button type='submit' name='submit' value='submit'>submit</button>
    </form>
</body>
</html>
